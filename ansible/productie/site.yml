---
- name: Installeer nginx op webservers
  hosts: webservers
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Installeer nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Zorg dat nginx gestart en enabled is
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

- name: Installeer MariaDB op database server
  hosts: databases
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Installeer mariadb-server
      ansible.builtin.apt:
        name: mariadb-server
        state: present

    - name: Zorg dat mariadb gestart en enabled is
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true
